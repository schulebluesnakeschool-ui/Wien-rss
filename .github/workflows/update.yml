name: Update RSS Feed every 30 seconds

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run update script (first run)
        run: python update.py

      - name: Wait 30 seconds
        run: sleep 30

      - name: Run update script (second run)
        run: python update.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto-update RSS feed" || echo "No changes to commit"
          git pull --rebase
          git push
