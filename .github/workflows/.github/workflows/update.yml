import urllib.request
import urllib.parse
import json
from datetime import datetime

def get_json(url, params=None):
    if params:
        url = url + "?" + urllib.parse.urlencode(params)
    with urllib.request.urlopen(url) as response:
        return json.loads(response.read().decode("utf-8"))

# 1. Haltestelle "Strozzigasse" suchen
stop_search = get_json(
    "https://transport.rest/stops",
    {"query": "Strozzigasse", "results": 1}
)

stop_id = stop_search[0]["id"]

# 2. Abfahrten abrufen
departures = get_json(
    f"https://transport.rest/stops/{stop_id}/departures",
    {"duration": 30}
)

# 3. Filtern: nur 13A Richtung Hauptbahnhof
filtered = []
for dep in departures:
    if dep["line"]["name"] == "13A" and "Hauptbahnhof" in dep["direction"]:
        filtered.append(dep)

# 4. RSS-Feed erzeugen
rss_items = ""
for i, dep in enumerate(filtered):
    when = dep["when"]
    dt = datetime.fromisoformat(when.replace("Z", "+00:00"))
    time_str = dt.strftime("%H:%M:%S")

    rss_items += f"""
    <item>
      <title>13A → Hauptbahnhof um {time_str}</title>
      <description>Abfahrt um {time_str}</description>
      <guid>13A-{i}</guid>
    </item>
    """

rss_feed = f"""<?xml version="1.0" encoding="UTF-8"?>
<rss version="2.0">
  <channel>
    <title>13A Strozzigasse → Hauptbahnhof</title>
    <link>https://transport.rest</link>
    <description>Echtzeit-Abfahrten des 13A ab Strozzigasse Richtung Hauptbahnhof</description>
    <language>de</language>
    {rss_items}
  </channel>
</rss>
"""

# 5. Datei speichern
with open("13a-strozzigasse-hbf.xml", "w", encoding="utf-8") as f:
    f.write(rss_feed)
